<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elnora Intelligence Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --bg: #1B1512; --panel: #241C17; --panel-2: #2C221C;
    --ink: #F1E9DE; --muted: #A6957F; --faint: #6B5C4C;
    --safelight: #C1432B; --safelight-soft: rgba(193,67,43,0.14);
    --negative: #CFE8E2; --negative-soft: rgba(207,232,226,0.09);
    --gold: #B08D57; --line: #3A2E26;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(ellipse at 20% -10%, rgba(193,67,43,0.06), transparent 50%),
      var(--bg);
    color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; -webkit-font-smoothing: antialiased;
  }
  .wrap{ max-width: 1180px; margin: 0 auto; padding: 56px 28px 90px; }
  .eyebrow{ font-family:'IBM Plex Mono', monospace; letter-spacing:0.14em; text-transform:uppercase; font-size:11.5px; color:var(--safelight); display:flex; align-items:center; gap:10px; }
  .eyebrow .dot{ width:7px; height:7px; border-radius:50%; background:var(--negative); box-shadow:0 0 0 3px var(--negative-soft); }
  h1.title{ font-family:'Zilla Slab', serif; font-weight:600; font-size:clamp(30px,4.6vw,50px); line-height:1.05; margin:14px 0 12px; letter-spacing:-0.005em; }
  .subtitle{ color:var(--muted); font-size:15.5px; line-height:1.6; max-width:680px; margin:0; }
  .subtitle b{ color:var(--ink); font-weight:600; }

  .api-banner{ margin-top:22px; padding:12px 16px; border-radius:8px; font-size:13px; display:flex; align-items:center; gap:10px; border:1px solid var(--line); }
  .api-banner.ok{ background: var(--negative-soft); color: var(--negative); border-color: rgba(207,232,226,0.35); }
  .api-banner.err{ background: var(--safelight-soft); color: #e08b7c; border-color: rgba(193,67,43,0.5); }
  .api-banner code{ font-family:'IBM Plex Mono', monospace; background: rgba(0,0,0,0.25); padding: 1px 6px; border-radius: 4px; }

  .tab-row{ display:flex; gap:8px; margin: 32px 0 22px; border-bottom: 1px solid var(--line); }
  .tab{ font-family:'IBM Plex Mono', monospace; font-size:12.5px; text-transform:uppercase; letter-spacing:0.06em;
        background:none; border:none; color:var(--faint); padding:10px 4px; margin-right:22px; cursor:pointer; position:relative; }
  .tab.active{ color: var(--ink); }
  .tab.active::after{ content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--safelight); }

  .controls{ display:flex; flex-wrap:wrap; gap:10px 12px; align-items:center; padding:14px 18px; background:var(--panel); border:1px solid var(--line); border-radius:10px; margin-bottom: 24px; }
  .control-label{ font-family:'IBM Plex Mono', monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--faint); margin-right:4px; }
  .btn{ border:1px solid var(--line); background:transparent; color:var(--muted); font-family:'IBM Plex Sans', sans-serif; font-size:13px; padding:7px 14px; border-radius:7px; cursor:pointer; transition:all .15s ease; }
  .btn:hover{ border-color:var(--safelight); color:var(--ink); }
  .btn.primary{ background: var(--safelight-soft); border-color: var(--safelight); color: #e8917f; font-weight:500; }
  .btn:disabled{ opacity:0.45; cursor:default; }
  .spacer{ flex:1; }
  input.code-input{ background:transparent; border:1px solid var(--line); border-radius:7px; color:var(--ink); padding:6px 10px; font-size:13px; width:200px; font-family:'IBM Plex Mono', monospace; }

  .grid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:16px; margin-bottom:36px; }

  /* Company cards */
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:20px 22px; }
  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .card-name{ font-family:'Zilla Slab', serif; font-size:19px; font-weight:600; margin:0; }
  .card-cat{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:var(--faint); margin-top:3px; text-transform:uppercase; letter-spacing:0.04em; }
  .note{ font-size:13px; color:var(--muted); line-height:1.55; margin-top:12px; }
  .feature-list{ margin: 10px 0 0; padding-left: 18px; font-size: 12.5px; color: var(--muted); line-height: 1.6; }
  .card-foot{ display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding-top:14px; border-top:1px solid var(--line); }
  .fund-fig{ font-family:'IBM Plex Mono', monospace; font-size:13px; color:var(--gold); }
  .as-of{ font-size: 10.5px; color: var(--faint); margin-top: 2px; }

  .pending{ margin-top:14px; padding:13px 15px; border-radius:9px; background: rgba(176,141,87,0.08); border: 1px solid rgba(176,141,87,0.4); }
  .pending-head{ display:flex; justify-content:space-between; align-items:center; font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:var(--gold); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }
  .diff-row{ font-size:12.5px; color:var(--ink); margin:5px 0; }
  .diff-row .lbl{ color:var(--muted); }
  .diff-row .from{ color: var(--faint); text-decoration: line-through; }
  .diff-row .to{ color: var(--negative); font-weight:600; }
  .pending-actions{ display:flex; gap:8px; margin-top:11px; }
  .pending-actions .btn{ font-size:12px; padding:5px 12px; }
  .no-changes{ font-size:12.5px; color: var(--muted); font-style: italic; }

  /* Finding "developing" cards */
  .finding-card{
    background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:20px 22px;
    filter: invert(1) grayscale(1) contrast(1.1);
    transition: filter 1.1s cubic-bezier(.4,0,.2,1);
  }
  .finding-card.developed{ filter: invert(0) grayscale(0) contrast(1); }
  .finding-title{ font-family:'Zilla Slab', serif; font-size:17px; font-weight:600; margin:0 0 4px; line-height:1.3; }
  .finding-meta{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:var(--faint); }
  .finding-field{ margin-top:12px; }
  .finding-field .k{ font-family:'IBM Plex Mono', monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.06em; color:var(--negative); }
  .finding-field .v{ font-size:13px; color:var(--muted); line-height:1.55; margin-top:2px; }
  .finding-actions{ display:flex; gap:8px; margin-top:16px; padding-top:14px; border-top:1px solid var(--line); }
  .status-badge{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; padding:3px 9px; border-radius:999px; text-transform:uppercase; }
  .status-badge.pending_review{ background: rgba(176,141,87,0.14); color: var(--gold); border:1px solid rgba(176,141,87,0.4); }
  .status-badge.approved_for_export{ background: var(--negative-soft); color: var(--negative); border:1px solid rgba(207,232,226,0.4); }
  .status-badge.rejected{ background: rgba(107,92,76,0.2); color: var(--faint); border:1px solid var(--line); }

  .empty-state{ text-align:center; padding: 48px 20px; color: var(--faint); font-size:13.5px; border: 1px dashed var(--line); border-radius: 12px; }

  footer{ border-top:1px solid var(--line); margin-top:24px; padding-top:22px; color:var(--faint); font-size:12px; line-height:1.7; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API_BASE = window.ELNORA_API_BASE || "http://localhost:4001/api";

function authHeaders(code) {
  return code ? { "x-dashboard-code": code } : {};
}

function CompanyCard({ company, onRefresh, onApprove, onReject, refreshing, busy }) {
  const b = company.baseline;
  return (
    <div className="card">
      <div className="card-top">
        <div>
          <p className="card-name">{company.name}</p>
          <div className="card-cat">{company.category}</div>
        </div>
      </div>
      <div className="note">{b.summary}</div>
      <ul className="feature-list">
        {(b.keyFeatures || []).slice(0, 4).map((f, i) => <li key={i}>{f}</li>)}
      </ul>
      <div className="card-foot">
        <div>
          <div className="fund-fig">{b.fundingKnown || "Funding not publicly disclosed"}</div>
          <div className="as-of">Baseline as of {b.asOf}</div>
        </div>
        <button className="btn" disabled={refreshing} onClick={() => onRefresh(company.id)}>
          {refreshing ? "Researching\u2026" : "Refresh"}
        </button>
      </div>
      {company.pendingUpdate && (
        <div className="pending">
          <div className="pending-head">
            <span>Pending review \u00b7 {new Date(company.pendingUpdate.fetchedAt).toLocaleString()}</span>
            <span>{company.pendingUpdate.changes.length} change{company.pendingUpdate.changes.length!==1?"s":""}</span>
          </div>
          {company.pendingUpdate.changes.length === 0 && <div className="no-changes">No material changes found.</div>}
          {company.pendingUpdate.changes.map((c, i) => (
            <div className="diff-row" key={i}>
              <span className="lbl">{c.field}: </span>
              <span className="from">{c.from ?? "\u2014"}</span> {"\u2192"} <span className="to">{c.to}</span>
            </div>
          ))}
          <div className="pending-actions">
            <button className="btn primary" disabled={busy} onClick={() => onApprove(company.id)}>Approve &amp; publish</button>
            <button className="btn" disabled={busy} onClick={() => onReject(company.id)}>Reject</button>
          </div>
        </div>
      )}
    </div>
  );
}

function FindingCard({ finding, onApprove, onReject, busy }) {
  const [developed, setDeveloped] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setDeveloped(true), 250);
    return () => clearTimeout(t);
  }, []);

  return (
    <div className={"finding-card" + (developed ? " developed" : "")}>
      <div className="card-top">
        <div>
          <p className="finding-title">{finding.title}</p>
          <div className="finding-meta">{finding.source} {finding.publishedDate ? `\u00b7 ${finding.publishedDate}` : ""}</div>
        </div>
        <span className={"status-badge " + finding.status}>{finding.status.replace(/_/g, " ")}</span>
      </div>

      {finding.target && <div className="finding-field"><div className="k">Target / mechanism</div><div className="v">{finding.target}</div></div>}
      {finding.hypothesis && <div className="finding-field"><div className="k">Hypothesis</div><div className="v">{finding.hypothesis}</div></div>}
      {finding.outcomeSummary && <div className="finding-field"><div className="k">What happened</div><div className="v">{finding.outcomeSummary}</div></div>}
      {finding.whyItFailed && <div className="finding-field"><div className="k">Why it failed</div><div className="v">{finding.whyItFailed}</div></div>}
      {finding.reuseAngle && <div className="finding-field"><div className="k">Reuse angle</div><div className="v">{finding.reuseAngle}</div></div>}

      <div className="finding-actions">
        {finding.status === "pending_review" && (
          <React.Fragment>
            <button className="btn primary" disabled={busy} onClick={() => onApprove(finding.id)}>Approve for pipeline</button>
            <button className="btn" disabled={busy} onClick={() => onReject(finding.id)}>Reject</button>
          </React.Fragment>
        )}
        <a className="btn" style={{textDecoration:"none"}} href={`${API_BASE}/findings/${finding.id}/export`} target="_blank" rel="noopener noreferrer">View export JSON</a>
        <a className="btn" style={{textDecoration:"none"}} href={finding.url} target="_blank" rel="noopener noreferrer">Source</a>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("companies");
  const [companies, setCompanies] = useState([]);
  const [findings, setFindings] = useState([]);
  const [apiStatus, setApiStatus] = useState("checking");
  const [apiError, setApiError] = useState("");
  const [accessCode, setAccessCode] = useState("");
  const [refreshingIds, setRefreshingIds] = useState({});
  const [busyIds, setBusyIds] = useState({});
  const [scanning, setScanning] = useState(false);
  const [scanLimit, setScanLimit] = useState(15);
  const [lastScanSummary, setLastScanSummary] = useState(null);

  const loadAll = useCallback(async () => {
    try {
      const [cRes, fRes] = await Promise.all([
        fetch(`${API_BASE}/companies`), fetch(`${API_BASE}/findings`),
      ]);
      if (!cRes.ok || !fRes.ok) throw new Error(`Server responded ${cRes.status}/${fRes.status}`);
      setCompanies(await cRes.json());
      setFindings(await fRes.json());
      setApiStatus("ok");
    } catch (err) {
      setApiStatus("err"); setApiError(err.message);
    }
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  async function refreshCompany(id) {
    setRefreshingIds((s) => ({ ...s, [id]: true }));
    try {
      const res = await fetch(`${API_BASE}/companies/${id}/refresh`, { method: "POST", headers: authHeaders(accessCode) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Refresh failed");
      setCompanies((cs) => cs.map((c) => (c.id === id ? data : c)));
    } catch (err) { alert(`Refresh failed: ${err.message}`); }
    finally { setRefreshingIds((s) => ({ ...s, [id]: false })); }
  }

  async function approveCompany(id) {
    setBusyIds((s) => ({ ...s, [id]: true }));
    try {
      const res = await fetch(`${API_BASE}/companies/${id}/approve`, { method: "POST" });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      setCompanies((cs) => cs.map((c) => (c.id === id ? data : c)));
    } catch (err) { alert(err.message); }
    finally { setBusyIds((s) => ({ ...s, [id]: false })); }
  }

  async function rejectCompany(id) {
    setBusyIds((s) => ({ ...s, [id]: true }));
    try {
      const res = await fetch(`${API_BASE}/companies/${id}/reject`, { method: "POST" });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      setCompanies((cs) => cs.map((c) => (c.id === id ? data : c)));
    } catch (err) { alert(err.message); }
    finally { setBusyIds((s) => ({ ...s, [id]: false })); }
  }

  async function runScan() {
    setScanning(true); setLastScanSummary(null);
    try {
      const res = await fetch(`${API_BASE}/findings/scan?limit=${scanLimit}`, { method: "POST", headers: authHeaders(accessCode) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Scan failed");
      setLastScanSummary(data);
      await loadAll();
    } catch (err) { alert(`Scan failed: ${err.message}`); }
    finally { setScanning(false); }
  }

  async function approveFinding(id) {
    setBusyIds((s) => ({ ...s, [id]: true }));
    try {
      const res = await fetch(`${API_BASE}/findings/${id}/approve`, { method: "POST" });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      setFindings((fs) => fs.map((f) => (f.id === id ? data.finding : f)));
    } catch (err) { alert(err.message); }
    finally { setBusyIds((s) => ({ ...s, [id]: false })); }
  }

  async function rejectFinding(id) {
    setBusyIds((s) => ({ ...s, [id]: true }));
    try {
      const res = await fetch(`${API_BASE}/findings/${id}/reject`, { method: "POST" });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      setFindings((fs) => fs.map((f) => (f.id === id ? data : f)));
    } catch (err) { alert(err.message); }
    finally { setBusyIds((s) => ({ ...s, [id]: false })); }
  }

  return (
    <div className="wrap">
      <div className="eyebrow"><span className="dot"></span>ELNORA AI &middot; COMPETITIVE &amp; NEGATIVE-DATA SIGNAL DESK</div>
      <h1 className="title">The Intelligence Desk</h1>
      <p className="subtitle">
        Tracks the AI-copilot competitive set alongside a live feed of <b>negative and null results</b> from the
        literature \u2014 the exact kind of buried data Elnora's own thesis says should be reused, not discarded.
      </p>

      {apiStatus === "err" && (
        <div className="api-banner err">
          Can't reach the backend at <code>{API_BASE}</code> ({apiError}). Start it with
          <code>cd server &amp;&amp; npm install &amp;&amp; npm start</code>.
        </div>
      )}
      {apiStatus === "ok" && <div className="api-banner ok">Connected to {API_BASE}</div>}

      <div className="tab-row">
        <button className={"tab" + (tab==="companies"?" active":"")} onClick={() => setTab("companies")}>Competitor Intel</button>
        <button className={"tab" + (tab==="findings"?" active":"")} onClick={() => setTab("findings")}>Negative-Data Darkroom</button>
      </div>

      <div className="controls">
        <span className="control-label">Access code</span>
        <input className="code-input" type="password" placeholder="only needed if host requires one"
               value={accessCode} onChange={(e) => setAccessCode(e.target.value)} />
        <div style={{width:1, height:22, background:"var(--line)", margin:"0 4px"}}></div>
        {tab === "companies" ? (
          <React.Fragment>
            <span className="control-label">Actions</span>
            <span className="note" style={{margin:0}}>Refresh each company individually below.</span>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <span className="control-label">Batch size</span>
            <input
              type="number" min="5" max="100" value={scanLimit}
              onChange={(e) => setScanLimit(Number(e.target.value))}
              style={{ width: 60, background:"transparent", border:"1px solid var(--line)", borderRadius:7,
                       color:"var(--ink)", padding:"6px 8px", fontSize:13, fontFamily:"'IBM Plex Mono', monospace" }}
            />
            <button className="btn primary" onClick={runScan} disabled={scanning || apiStatus !== "ok"}>
              {scanning ? "Scanning literature\u2026" : "Scan for new negative-data findings"}
            </button>
            {lastScanSummary && (
              <span className="note" style={{margin:0}}>
                Europe PMC found {lastScanSummary.hitCount ?? "?"} total match(es); scanned {lastScanSummary.candidatesScanned}, added {lastScanSummary.added} new finding(s).
              </span>
            )}
          </React.Fragment>
        )}
        <div className="spacer"></div>
        <button className="btn" onClick={loadAll} disabled={apiStatus !== "ok"}>Reload</button>
      </div>

      {tab === "companies" && (
        <div className="grid">
          {companies.map((c) => (
            <CompanyCard key={c.id} company={c} onRefresh={refreshCompany} onApprove={approveCompany}
                         onReject={rejectCompany} refreshing={!!refreshingIds[c.id]} busy={!!busyIds[c.id]} />
          ))}
        </div>
      )}

      {tab === "findings" && (
        findings.length === 0 ? (
          <div className="empty-state">No findings yet. Click "Scan for new negative-data findings" to search the literature.</div>
        ) : (
          <div className="grid">
            {findings.slice().reverse().map((f) => (
              <FindingCard key={f.id} finding={f} onApprove={approveFinding} onReject={rejectFinding} busy={!!busyIds[f.id]} />
            ))}
          </div>
        )
      )}

      <footer>
        <b>How this works:</b> "Scan" searches Europe PMC (free, covers bioRxiv and PubMed) for recent papers whose
        language suggests a negative or null result in Elnora's focus areas, then uses Claude to read each abstract,
        confirm it's a genuine negative finding, and extract structured fields. Approving a finding marks it ready
        for pipeline integration and (if configured) forwards it to a webhook \u2014 see the project README for how to
        point that at a real ingestion endpoint.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
